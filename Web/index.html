<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>AI 美膚分析</title>
    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- MediaPipe Face Mesh -->
    <script src="https://unpkg.com/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <!-- 樣式表 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">

        <!-- ==================== 相機區塊 ==================== -->
        <section id="section-camera" class="section active">
            <div class="camera-wrapper">
                <!-- 相機預覽 -->
                <div class="camera-preview">
                    <video id="cameraVideo" autoplay playsinline muted></video>

                    <!-- 臉部對齊框線 -->
                    <div class="face-guide">
                        <svg viewBox="0 0 200 260" class="face-oval">
                            <ellipse cx="100" cy="130" rx="70" ry="95" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="8 4"/>
                        </svg>
                    </div>

                    <!-- Canvas（用於截圖，隱藏） -->
                    <canvas id="cameraCanvas" style="display: none;"></canvas>
                </div>

                <!-- 提示文字 -->
                <div id="cameraTip" class="camera-tip">
                    請將臉部對準框線
                </div>

                <!-- 拍照按鈕 -->
                <div class="camera-controls">
                    <button id="captureBtn" class="capture-btn" disabled>
                        <span class="capture-btn-inner"></span>
                    </button>
                </div>
            </div>
        </section>

        <!-- ==================== 問卷區塊 ==================== -->
        <section id="section-survey" class="section">
            <div class="survey-wrapper">
                <!-- 頂部：照片縮圖 -->
                <div class="survey-header">
                    <div class="photo-thumbnail-wrapper">
                        <img id="photoThumbnail" class="photo-thumbnail" src="" alt="拍攝照片" style="display: none;">
                        <button id="retakePhotoBtn" class="btn-retake">重拍</button>
                    </div>
                    <div class="survey-title">
                        <h1>快速問卷</h1>
                        <p>用來調整分析權重與建議</p>
                    </div>
                </div>

                <!-- 問卷內容容器 -->
                <div id="surveyContainer" class="survey-content">
                    <!-- 由 survey.js 動態渲染 -->
                </div>
            </div>
        </section>

        <!-- ==================== Loading 區塊 ==================== -->
        <section id="section-loading" class="section">
            <div class="loading-wrapper">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
                <p id="loadingText" class="loading-text">分析中，請稍候...</p>
                <div class="loading-progress-bar">
                    <div id="loadingProgress" class="loading-progress-fill"></div>
                </div>
                <p class="loading-hint">AI 正在分析您的膚況，約需 10-15 秒</p>
            </div>
        </section>

        <!-- ==================== 結果區塊 ==================== -->
        <section id="section-result" class="section">
            <div id="resultContainer" class="result-wrapper">
                <!-- 由 result.js 動態渲染 -->
            </div>
        </section>

    </div>

    <!-- 主程式 -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
